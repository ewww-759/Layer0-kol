name: Layer0 KOL Scraper

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'discover'
        type: choice
        options:
          - discover
          - scrape
      limit:
        description: 'Max posts per account'
        required: false
        default: '20'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write config
        run: |
          cat > config/settings.yaml << 'YAML'
          base_url: "https://www.threads.net"
          timeout: 30
          use_offline: false
          use_proxies: false
          limit: 20
          usernames: []
          cookie: ""
          YAML

      - name: Write env
        run: |
          echo "THREADS_COOKIE=${{ secrets.THREADS_COOKIE }}" > .env
          echo "LOG_LEVEL=INFO" >> .env

      - name: Run scraper
        run: python src/main.py --mode discover --no-outreach

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scraper-results
          path: |
            output/
            data/seeds/
          retention-days: 7
