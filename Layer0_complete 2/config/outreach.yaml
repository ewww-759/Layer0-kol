# outreach.yaml
# -------------
# Outreach queue configuration for OutreachManager.

# The closing line appended to every message template.
# Replace with your actual call-to-action link or offer.
hook: "No commitment needed — just a quick conversation."

# Only accounts at this tier or above enter the outreach queue.
# Options: A-tier | B-tier | C-tier
min_tier: "B-tier"

# Hard cap on queue size per run
max_queue_size: 50

# ---------------------------------------------------------------------------
# Optional custom templates. Uncomment and edit to use.
# trigger options: creator | brand | personal | A-tier
# Placeholders: {username} {first_name} {kol_tier} {top_cta} {follower_count} {hook}
# ---------------------------------------------------------------------------
# templates:
#   my_template:
#     trigger: creator
#     body: |
#       Hey {first_name} — loved your recent content.
#       {hook}
